<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processamento de Imagens</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h2>Processamento de Imagens</h2>

<nav class="tabs">
    <button id="btnAritmetica" onclick="mostrarSecao('aritmetica')">
        Aritméticas
    </button>

    <button id="btnTransformacao" onclick="mostrarSecao('transformacao')">
        Transformações
    </button>

    <button id="btnLogica" onclick="mostrarSecao('logica')">
        Lógicas
    </button>

    <button id="btnFiltros" onclick="mostrarSecao('filtros')">
    Filtros
    </button>

    <div class="tab-indicator"></div>
</nav>
</header>


<!-- WORKSPACE -->
<section class="workspace">

<div class="image-box">
<h3>Imagem 1</h3>
<input type="file" id="img1">
<canvas id="canvas1"></canvas>
</div>

<div class="image-box">
<h3>Imagem 2</h3>
<input type="file" id="img2">
<canvas id="canvas2"></canvas>
</div>

<div class="image-box">
<h3>Resultado</h3>
<canvas id="canvasResultado"></canvas>
<button id="btnSave">Salvar</button>
</div>

</section>


<div class="sections-container">

<!-- =========================
     ARITMÉTICAS
========================= -->
<section id="aritmetica" class="controls">

<h3>Operações entre imagens</h3>

<div class="buttons">
<button id="btnAdd">Somar</button>
<button id="btnSubtract">Subtrair</button>
</div>


<h3>Contraste</h3>

<div class="slider-box">

<label>Contraste:</label>

<input type="range" id="contrast" min="0.1" max="3" step="0.1" value="1">
<span id="contrastValue">1</span>

<div class="buttons">
<button id="btnMultiply">Multiplicar</button>
<button id="btnDivide">Dividir</button>
</div>

</div>


<h3>Brilho</h3>

<div class="slider-box">

<label>Brilho:</label>

<input type="range" id="brightness" min="-100" max="100" value="0">

<button id="btnApplyBrightness">Aplicar</button>

</div>

</section>


<!-- =========================
     TRANSFORMAÇÕES
========================= -->
<section id="transformacao" class="controls">

<h3>Transformações</h3>

<div class="buttons">
<button id="btnGray">Escala de Cinza</button>
<button id="btnFlipH">Flip Horizontal</button>
<button id="btnFlipV">Flip Vertical</button>
<button id="btnDifference">Diferença</button>
</div>


<h3>Blending</h3>

<div class="slider-box">

<label>Alpha:</label>

<input type="range" id="alpha" min="0" max="1" step="0.1" value="0.5">

<span id="alphaValue">0.5</span>

<button id="btnBlending">Aplicar</button>
<button id="btnAverage">Média</button>

</div>

</section>


<!-- =========================
     LÓGICAS
========================= -->

<section id="logica" class="controls">

<h3>Operações Lógicas</h3>

<div class="buttons">
    <button id="btnConvertBinary">Converter para Binário</button>
</div>

<div class="buttons">
    <button id="btnAND">AND</button>
    <button id="btnOR">OR</button>
    <button id="btnXOR">XOR</button>
    <button id="btnNOT">NOT</button>
    <button id="btnNegative">Negativo</button>
    <button id="btnHistogram">Equalizar Histograma</button>
    
</div>

<h3>Limiarização</h3>

<div class="slider-box">

<label>Limiar:</label>

<input type="range" id="threshold" min="0" max="255" value="127">

<span id="thresholdValue">127</span>

</div>

</section>


<!-- =========================
     FILTROS
========================= -->
<section id="filtros" class="controls">

<h3>Filtros Espaciais</h3>

<div class="buttons">

<button id="btnMean">Filtro Média</button>
<button id="btnMedian">Filtro Mediana</button>
<button id="btnMax">Filtro Máximo</button>
<button id="btnMin">Filtro Mínimo</button>

</div>

</section>

</div>


<script>
function mostrarSecao(secao) {

    const arit = document.getElementById("aritmetica")
    const trans = document.getElementById("transformacao")
    const logica = document.getElementById("logica")
    const filtros = document.getElementById("filtros")


    const indicator = document.querySelector(".tab-indicator")

    const btnA = document.getElementById("btnAritmetica")
    const btnT = document.getElementById("btnTransformacao")
    const btnL = document.getElementById("btnLogica")
    const btnF = document.getElementById("btnFiltros")

    arit.classList.remove("active")
    trans.classList.remove("active")
    logica.classList.remove("active")
    filtros.classList.remove("active")


    btnA.classList.remove("active")
    btnT.classList.remove("active")
    btnL.classList.remove("active")
    btnF.classList.remove("active")

    let activeBtn

    if (secao === "aritmetica") {
        arit.classList.add("active")
        activeBtn = btnA
    } else if (secao === "transformacao") {
        trans.classList.add("active")
        activeBtn = btnT
    } else if (secao === "logica") {
        logica.classList.add("active")
        activeBtn = btnL
    } else if (secao === "filtros") {
        filtros.classList.add("active")
        activeBtn = btnF
    }

    activeBtn.classList.add("active")

    const rect = activeBtn.getBoundingClientRect()
    const parentRect = activeBtn.parentElement.getBoundingClientRect()

    indicator.style.width = rect.width + "px"
    indicator.style.left = (rect.left - parentRect.left) + "px"
}
</script>

<script>
mostrarSecao("aritmetica")
</script>

<script type="module" src="js/main.js"></script>

</body>
</html>
